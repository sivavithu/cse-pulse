app = "cse-pulse"
primary_region = "sin"        # Singapore — closest to Sri Lanka

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  CSE_PULSE_DB_PATH = "/data/cse-pulse.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "cse_pulse_data"
  destination = "/data"
  initial_size = "1gb"
