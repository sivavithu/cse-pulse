name: Alert Check

on:
  schedule:
    - cron: "*/5 3-11 * * 1-5"  # Every 5 min, 9am-5pm Sri Lanka time (UTC+5:30 = 3:30-11:30 UTC), weekdays
  workflow_dispatch:             # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger alert check
        run: |
          curl -s -X GET "${{ secrets.APP_URL }}/api/alerts/check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30
